services:
  postgres:
    image: postgres:15
    container_name: campus_skill_exchange_db
    environment:
      POSTGRES_DB: campus_skill_exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
